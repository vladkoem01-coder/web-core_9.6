<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title><%= htmlWebpackPlugin.options.title %></title>
  </head>
  <body>
   <div class="header">
     <div class="header__img">
        <img src="img/burger.svg" alt="menu">
        <img src="img/divider.svg" alt="divider" class="page__img__tablet">
        <img src="img/Group.png" alt="logo">
     </div> 
     <div class="header__img__right">
        <img src="imgTablet/call.svg" class="tablet" alt="Call">
        <img src="imgTablet/chat.svg" class="tablet" alt="Chat">
        <img src="imgTablet/profile.svg" class="tablet" alt="Profile">
        <img src="img/divider.svg" alt="line">
        <img src="img/repair.svg" alt="repair">
        <img src="img/finder.svg" alt="finder">
    </div>
    </div> 

     <div class="upper-menu">
        <div class="upper-menu__left">
        <h2>Услуги и сервисы</h2>
        </div>
        <div class="upper-menu__right">
            <div class="menu-item">
                <span>Оставить заявку</span>
                <img src="img/repair.svg" alt="repair">
            </div>
            <div class="menu-item">
                <span>Статус ремонта</span>
                <img src="img/finder.svg" alt="status repair">
            </div>
        </div>
    </div>

    
  </body>
</html>
